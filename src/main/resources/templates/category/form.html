<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit ? 'Modifier une catégorie' : 'Créer une catégorie'}">Catégorie</title>
    <meta name="author" content="Cyril Godet">
</head>
<body>
<h1 th:text="${isEdit ? 'Modifier une catégorie' : 'Créer une catégorie'}">Catégorie</h1>
<form th:action="@{/categories/save}" th:object="${category}" method="post">
    <input type="hidden" th:field="*{idCategory}">
    
    <div class="form-group">
        <label for="nameCategory">Nom de la catégorie:</label>
        <input type="text" id="nameCategory" name="nameCategory" th:value="*{nameCategory}" required>
    </div>
    
    <div class="form-group">
        <label for="epreuveId">Épreuve:</label>
        <select id="epreuveId" name="epreuveId">
            <option value="">-- Sélectionner une épreuve --</option>
            <option th:each="e : ${epreuves}" 
                    th:value="${e.idEpreuve}" 
                    th:text="${e.nomEpreuve}"
                    th:selected="${category.epreuve != null && category.epreuve.idEpreuve == e.idEpreuve}">
            </option>
        </select>
    </div>
    
    <button type="submit" class="btn btn-primary">Enregistrer</button>
    <a href="/categories" class="btn btn-secondary">Annuler</a>
</form>
</body>
</html>

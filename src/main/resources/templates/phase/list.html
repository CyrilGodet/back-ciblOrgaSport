<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Liste des phases</title>
    <meta name="author" content="Cyril Godet">
</head>
<body>
<div class="navbar">
    <a href="/">Accueil</a>
    <a href="/competitions">Compétitions</a>
    <a href="/epreuves">Épreuves</a>
    <a href="/phases" class="active">Phases</a>
    <a href="/categories">Catégories</a>
</div>
<div class="content">
<h1>Phases</h1>
<a href="/phases/new" class="btn btn-primary">Créer une nouvelle phase</a>
<table>
    <thead>
        <tr>
            <th>Id</th>
            <th>Nom de la phase</th>
            <th>Épreuve</th>
            <th>Compétition</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="p : ${phases}">
            <td th:text="${p.idPhase}"></td>
            <td th:text="${p.nomPhase}"></td>
            <td th:text="${p.epreuve != null ? p.epreuve.nomEpreuve : 'Aucune'}"></td>
            <td th:text="${p.epreuve != null && p.epreuve.competition != null ? p.epreuve.competition.nameCompetition : 'Aucune'}"></td>
            <td>
                <a th:href="@{'/phases/edit/' + ${p.idPhase}}" class="btn btn-warning">Modifier</a>
                <a th:href="@{'/phases/delete/' + ${p.idPhase}}" class="btn btn-danger" onclick="return confirm('Êtes-vous sûr de vouloir supprimer cette phase ?')">Supprimer</a>
            </td>
        </tr>
    </tbody>
</table>
</div>
</body>
</html>

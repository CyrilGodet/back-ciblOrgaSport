<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${competition.idCompetition != null ? 'Modifier une compétition' : 'Créer une compétition'}">Compétition</title>
    <meta name="author" content="Cyril Godet">
</head>
<body>
<h1 th:text="${competition.idCompetition != null ? 'Modifier une compétition' : 'Créer une compétition'}">Compétition</h1>
<form th:action="@{/competitions/save}" th:object="${competition}" method="post">
    <input type="hidden" th:field="*{idCompetition}">
    
    <div class="form-group">
        <label for="nameCompetition">Nom:</label>
        <input type="text" id="nameCompetition" name="nameCompetition" th:value="*{nameCompetition}" required>
    </div>
    
    <div class="form-group">
        <label for="dateDebutStr">Date début:</label>
        <input type="date" id="dateDebutStr" name="dateDebutStr" th:value="${competition.dateDebut}" required>
    </div>
    
    <div class="form-group">
        <label for="dateFinStr">Date fin:</label>
        <input type="date" id="dateFinStr" name="dateFinStr" th:value="${competition.dateFin}" required>
    </div>
    
    <button type="submit" class="btn btn-primary">Enregistrer</button>
    <a href="/competitions" class="btn btn-secondary">Annuler</a>
</form>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Liste des épreuves</title>
    <meta name="author" content="Cyril Godet">
</head>
<body>
<div class="navbar">
    <a href="/">Accueil</a>
    <a href="/competitions">Compétitions</a>
    <a href="/epreuves" class="active">Épreuves</a>
    <a href="/phases">Phases</a>
    <a href="/categories">Catégories</a>
</div>
<div class="content">
<h1>Épreuves</h1>
<a href="/epreuves/new" class="btn btn-primary">Créer une nouvelle épreuve</a>
<table>
    <thead>
        <tr>
            <th>Id</th>
            <th>Nom de l'épreuve</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="e : ${epreuves}">
            <td th:text="${e.idEpreuve}"></td>
            <td th:text="${e.nomEpreuve}"></td>
            <td>
                <a th:href="@{'/epreuves/edit/' + ${e.idEpreuve}}" class="btn btn-warning">Modifier</a>
                <a th:href="@{'/epreuves/delete/' + ${e.idEpreuve}}" class="btn btn-danger" onclick="return confirm('Êtes-vous sûr de vouloir supprimer cette épreuve ?')">Supprimer</a>
            </td>
        </tr>
    </tbody>
</table>
</div>
</body>
</html>

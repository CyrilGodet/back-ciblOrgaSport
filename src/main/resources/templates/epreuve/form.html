<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit ? 'Modifier une épreuve' : 'Créer une épreuve'}">Épreuve</title>
    <meta name="author" content="Cyril Godet">
</head>
<body>
<h1 th:text="${isEdit ? 'Modifier une épreuve' : 'Créer une épreuve'}">Épreuve</h1>
<form th:action="@{/epreuves/save}" th:object="${epreuve}" method="post">
    <input type="hidden" th:field="*{idEpreuve}">
    
    <div class="form-group">
        <label for="nomEpreuve">Nom de l'épreuve:</label>
        <input type="text" id="nomEpreuve" name="nomEpreuve" th:value="*{nomEpreuve}" required>
    </div>
    <div class="form-group">
        <label for="competitionId">Compétition associée:</label>
        <select id="competitionId" name="competitionId">
            <option value="">-- Aucune compétition --</option>
            <option th:each="comp : ${competitions}" 
                    th:value="${comp.idCompetition}" 
                    th:text="${comp.nameCompetition}" 
                    th:selected="${epreuve.competition != null && comp.idCompetition == epreuve.competition.idCompetition}">
            </option>
        </select>
    </div>
    <button type="submit" class="btn btn-primary">Enregistrer</button>
    <a href="/epreuves" class="btn btn-secondary">Annuler</a>
</form>
</body>
</html>

services:
  - type: web
    name: cibl-orga-sport-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: cibl-orga-sport-db
          property: connectionString
      - key: JAVA_OPTS
        value: "-Xmx512m -Xms256m"
    plan: free

databases:
  - name: cibl-orga-sport-db
    databaseName: glop
    plan: free

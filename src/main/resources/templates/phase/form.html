<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit ? 'Modifier une phase' : 'Créer une phase'}">Phase</title>
    <meta name="author" content="Cyril Godet">
</head>
<body>
<h1 th:text="${isEdit ? 'Modifier une phase' : 'Créer une phase'}">Phase</h1>
<form th:action="@{/phases/save}" th:object="${phase}" method="post">
    <input type="hidden" th:field="*{idPhase}">
    
    <div class="form-group">
        <label for="nomPhase">Nom de la phase:</label>
        <input type="text" id="nomPhase" name="nomPhase" th:value="*{nomPhase}" required>
    </div>
    
    <div class="form-group">
        <label for="epreuveId">Épreuve:</label>
        <select id="epreuveId" name="epreuveId">
            <option value="">-- Sélectionner une épreuve --</option>
            <option th:each="e : ${epreuves}" 
                th:value="${e.idEpreuve}" 
                th:text="${e.nomEpreuve} + (${e.competition != null} ? ' - ' + ${e.competition.nameCompetition} : '')"
                th:selected="${phase.epreuve != null && phase.epreuve.idEpreuve == e.idEpreuve}">
            </option>
        </select>
    </div>
    
    <button type="submit" class="btn btn-primary">Enregistrer</button>
    <a href="/phases" class="btn btn-secondary">Annuler</a>
</form>
</body>
</html>

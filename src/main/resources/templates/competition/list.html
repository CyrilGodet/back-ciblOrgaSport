<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Liste des compétitions</title>
    <meta name="author" content="Cyril Godet">
</head>
<body>
<div class="navbar">
    <a href="/">Accueil</a>
    <a href="/competitions" class="active">Compétitions</a>
    <a href="/epreuves">Épreuves</a>
    <a href="/phases">Phases</a>
    <a href="/categories">Catégories</a>
</div>
<div class="content">
<h1>Compétitions</h1>
<a href="/competitions/new" class="btn btn-primary">Créer une nouvelle compétition</a>
<table>
    <thead>
        <tr>
            <th>Id</th>
            <th>Nom</th>
            <th>Date début</th>
            <th>Date fin</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="c : ${competitions}">
            <td th:text="${c.idCompetition}"></td>
            <td th:text="${c.nameCompetition}"></td>
            <td th:text="${c.dateDebut}"></td>
            <td th:text="${c.dateFin}"></td>
            <td>
                <a th:href="@{'/competitions/' + ${c.idCompetition} + '/epreuves'}" class="btn btn-info">Gérer épreuves</a>
                <a th:href="@{'/competitions/edit/' + ${c.idCompetition}}" class="btn btn-warning">Modifier</a>
                <a th:href="@{'/competitions/delete/' + ${c.idCompetition}}" class="btn btn-danger" onclick="return confirm('Êtes-vous sûr de vouloir supprimer cette compétition ?')">Supprimer</a>
            </td>
        </tr>
    </tbody>
</table>
</div>
</body>
</html>
